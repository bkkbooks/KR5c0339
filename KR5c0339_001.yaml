body:
  text: 大丹問答晉道士鄭思遠授入室弟子葛洪字稚川號抱朴子稽首我尊師先生曰洪竊謂人之權輿陰精陽精陽精魂立陰精魄成兩精相薄而生神明神以形用形以神生神之云逝形亦斯斃敢問先生其神可全乎其形可延乎先生曰神以道全形以術延洪又問曰道術之旨奚若先生曰道隱無名術彰有實有實而術可行無名而道可成道成而神自全矣洪曰道隱無名始存乎象外術彰有實本在乎彀中唯願先生少垂開獎先生曰夫術有俯仰屈伸胎息嗽津御女以還精餌朱兒以存身過是以往非吾所聞洪曰還精之方昔已聞命存身之術願更發蒙先生曰取金之精合石之液結為夫妻列為魂魄一體混沌兩精感激河車覆載鼎候斯扼洪爐烈火炎焰熻赫煙未及黑焰不霞碧如蓄扶搖若藏霹靂姹女氣索嬰兒聲寂透出兩儀麗乎四壁時歷幾多馬馳一驛宛其死矣釋然從革惡黜善遷情回性易紫色內達赤鋩外射熠若火生潤如血滴字曰中還可超大厄退藏於密服之無斁霧散五內川流百脈骨變金石顏回玉澤陽德乃敷陰功斯積南宮度名北帝落籍為道之首為仙之伯勿授非人以招譴謫又曰天地至大比身即小制至精以成藥孰淺識之能了夫何慮乎若有所少氣雙則和體獨則悄和則增壽悄則趣天命也一絶難乎再紹然而理以意求意在言表今試言之夫一陰一陽謂之道一金一石謂之丹石乘陽而熱金乘陰而寒其服食也取壯陽而伏陰其徵應也俾魂壯而魄殫類水流而趣濕若火動而赴乾其勢必然其理可觀伏望先生更容請益先生曰吾子之言精義可採彼陽之終已陰之極亥分為四時周行不殆天地相感日月相會胡可闕諸略舉其大且石液鬼隱金精山在實孤陰之獨化諒九幽之可待曷若君子之好逑得淑女之良配然後陰陽得中魂魄無外嗟世人之電光指桑田之變海斯言乃合於仙祕吾道得傳於真宰洪曰率臆之言偶符真理伏鍊石液其術奈何先生有曰物有狀可大可久採乎蠶食之前用乎火化之後成湯自止而淋下刳釜虛中而見受日月周旋五復伺候橐籥疾鼓金汁不走以水沃之則從有而入無以火溫之則從無而入有施素粉而委靈慚蘇黃而凝醜轉制不已神趣鬼驟提挈意氣返覆衰朽金歟石歟天年地壽無著於文訣之在口太清真人歌曰照徹數里皆上界仙官下來收採非但世人所遇也皆生在南方向日相近感氣積年而生也四千三百二十年乃生自然還丹上古仙人則知今用三年火象自然之氣今之仙人祕教但火候依節符斤兩炭數應爻卦乾坤用施行運轉逐日火候自然相邀夫一爻生二日半二爻生五日六十時一月有三百六十時得一年十二月得四千三百二十時一時當一年四千三百二十年象自然之氣從黃芽一周抽成龍虎從虎從龍一年形體如炭又去更一年赫然成還丹皆是陰陽交感變通靈化人之不測謂之神妙運火一畫夜象一周天四時生成陰陽合度自然之道抽添和合火候合符若無師授據按文修終無成理固不可造次也若專志不怠者必當遇師付訣矣太丹問答
