body:
  text: 大丹問答金木萬靈論紅鉛入黑鉛訣大丹問答晉道士鄭思遠授入室弟子葛洪字稚川號抱朴子稽首我尊師先生曰洪竊謂人之權輿隂精陽精陽精魂立隂精魄成兩精相薄而生神明神以形用形以神生神之云逝形亦斯斃敢問先生其神可全乎其形可延乎先生曰神以道全形以術延洪又問曰道術之旨奚若先生曰道隱無名術彰有實有實而術可行無名而道可成道成而神自全矣洪曰道隱無名始存乎象外術彰有實本在乎彀中唯願先生少垂開奬先生曰夫術有俯仰屈伸胎息嗽津御女以還精餌朱兒以存身過是以往非吾所聞洪曰還精之方昔已聞命存身之術願更發蒙先生曰取金之精合石之液結爲夫妻列爲魂魄一體混沌兩精感激河車覆載鼎候斯㧖洪爐烈火炎熖熻赫煙未及黑熖不霞碧如蓄扶揺若藏霹靈姹女氣索嬰兒聲寂透出兩儀麗乎四壁時歴㡬多馬馳一驛宛其死矣釋然從革惡黜善遷情廻性易紫色内達赤鋩外射熠若火生潤如血滴字曰中還可超大厄退藏於宻服之無斁霧散五内川流百脉骨變金石顔廻玉澤陽德乃敷隂㓛斯積南宫度名北帝落籍爲道之首爲仙之伯勿授非人以招譴謫又曰天地至大比身即小制至精以成藥孰淺識之能了夫何慮乎若有所少氣雙則和體獨則悄和則増夀悄則趣夭命也一絶難乎再紹然而理以意求意在言表今試言之夫一隂一陽謂之道一金一石謂之丹石乗陽而熱金乗隂而寒其服食也取壯陽而伏隂其徴應也俾魂壯而魄殫類水流而趣濕若火動而赴乾其勢必然其理可觀伏望先生更容請益先生曰吾子之言精義可採彼陽之終已隂之極亥分爲四時周行不殆天地相感日月相㑹胡可闕諸略舉其大且石液鬼隱金精山在寔孤隂之獨化諒九幽之可待曷若君子之好逑得淑女之良配然後隂陽得中魂魄無外嗟世人之電光指桑田之變海斯言乃合於仙祕吾道得傳於眞宰洪曰率臆之言偶符眞理伏鍊石液其術奈何先生有曰物有狀可大可久採乎蠶食之前用乎火化之後成湯自止而淋下刳釡虚中而見受日月周旋五復伺候槖籥疾鼓金汁不走以水沃之則從有而入无以火温之則從无而入有施素粉而委靈慙蘇黃而凝醜轉制不已神趣鬼驟提挈意氣返覆衰朽金歟石歟天年地夀无著於文訣之在口太清眞人歌曰照徹數里皆上界仙官下來收採非但世人所遇也皆生在南方向日相近感氣積年而生也四千三百二十年乃生自然還丹上古仙人則知今用三年火象自然之氣今之仙人祕教但火候依節符斤兩炭數應爻卦乾坤用施行運轉逐日火候自然相邀夫一爻生二日半二爻生五日六十時一月有三百六十時得一年十二月得四千三百二十時一時當一年四千三百二十年象自然之氣從黃芽一周抽成龍虎從虎從龍一年形體如炭又去更一年赫然成還丹皆是隂陽交感變通靈化人之不測謂之神妙運火一書夜象一周天四時生成陰陽合度自然之道抽添和合火候合符若无師授據按文修終无成理固不可造次也若專志不怠者必當遇師付訣矣石璧古文太丹問答
